<section class="lumio-manifesto py-[200px] px-margin max-w-[1728px] mx-auto relative flex flex-col items-center text-center bg-page-bg">

    <svg class="w-full h-full" fill="none" stroke="url(#manifesto-grad)" stroke-width="0.5" viewBox="0 0 100 100">
      <defs>
        <linearGradient id="manifesto-grad" x1="0%" x2="100%" y1="0%" y2="100%">
          <stop offset="0%" stop-color="#9D6E53"></stop>
          <stop offset="100%" stop-color="#7A5540"></stop>

      <circle cx="50" cy="50" r="48"></circle>

    <span class="lumio-manifesto__line">Rebuilt after an avalanche destroyed the original.</span>
    <span class="lumio-manifesto__line">

      <span class="lumio-manifesto__mark" data-manifesto-mark>
        <span class="lumio-manifesto__mark-base">material, light, and silence.</span>
        <span class="lumio-manifesto__mark-overlay" aria-hidden="true">
          <span class="lumio-manifesto__mark-overlay-text">material, light, and silence.</span>
